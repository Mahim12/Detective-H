name: iOS Build Check

on:
  push:
    branches:
      - '**' #Pipelines run on all branches instead of manually specifying  [ main, feature/vite-setup, feature/multiple-tests ] etc
  pull_request:
    branches:
      - '**' #Pipelines run on all branches instead of manually specifying

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync ios # Just syncs, doesn't try to 'add'

      - name: Build iOS App (Validation Only)
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme App \
                     -destination 'generic/platform=iOS Simulator' \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Export IPA
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          
          # 1. Archive the build
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme App \
                     -destination 'generic/platform=iOS' \
                     -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     archive

          # 2. Export the .ipa
          # Note: This step MAY still fail without a real Apple Certificate, 
          # but it's the correct way to try and generate the file.
          xcodebuild -exportArchive \
                     -archivePath App.xcarchive \
                     -exportOptionsPlist ios/App/App/ExportOptions.plist \
                     -exportPath output \
                     CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: detective-h-ios
          path: output/*.ipa